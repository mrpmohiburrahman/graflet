<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="topglow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#4ef08c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4ef08c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background + green top-glow -->
  <rect x="0" y="0" width="1200" height="630" fill="#0a0b0d"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#topglow)"/>

  <!-- ================= LEFT: text column ================= -->
  <!-- wordmark: graf (#e6edf3) + let (#4ef08c) -->
  <text x="90" y="250" font-family="JetBrains Mono, monospace" font-weight="700"
        font-size="104" letter-spacing="-2" text-anchor="start" dominant-baseline="alphabetic">
    <tspan fill="#e6edf3">graf</tspan><tspan fill="#4ef08c">let</tspan>
  </text>

  <!-- tagline -->
  <text x="94" y="316" font-family="Geist, Inter, system-ui, sans-serif" font-weight="400"
        font-size="33" fill="#8b949e" text-anchor="start" dominant-baseline="alphabetic">
    Docs as a graph, not snippets.
  </text>

  <!-- install chip -->
  <rect x="94" y="372" width="452" height="66" rx="11" fill="#0d0f12" stroke="#1c2027" stroke-width="1"/>
  <text x="122" y="405" font-family="JetBrains Mono, monospace" font-weight="700"
        font-size="27" fill="#4ef08c" text-anchor="start" dominant-baseline="middle">$</text>
  <text x="148" y="405" font-family="JetBrains Mono, monospace" font-weight="400"
        font-size="27" text-anchor="start" dominant-baseline="middle">
    <tspan fill="#8b949e">npx </tspan><tspan fill="#e6edf3">@graflethq/cli</tspan>
  </text>

  <!-- ================= RIGHT: g-in-a-web icon ================= -->
  <g transform="translate(695,90) scale(0.42)">
    <!-- dim edges -->
    <g stroke="#4a525c" fill="none" stroke-linecap="round">
      <g stroke-width="4" opacity="0.9">
        <line x1="660" y1="300" x2="800" y2="355"/>
        <line x1="800" y1="355" x2="885" y2="290"/>
        <line x1="560" y1="300" x2="640" y2="185"/>
        <line x1="640" y1="185" x2="800" y2="355"/>
        <line x1="330" y1="420" x2="190" y2="400"/>
        <line x1="190" y1="400" x2="150" y2="515"/>
        <line x1="500" y1="710" x2="560" y2="835"/>
      </g>
    </g>

    <!-- dim gray nodes -->
    <g fill="#8b949e">
      <g opacity="0.95">
        <circle cx="800" cy="355" r="14"/>
        <circle cx="640" cy="185" r="14"/>
        <circle cx="190" cy="400" r="14"/>
        <circle cx="560" cy="835" r="14"/>
      </g>
      <g opacity="0.7">
        <circle cx="885" cy="290" r="11"/>
        <circle cx="150" cy="515" r="11"/>
      </g>
    </g>

    <!-- green-lit cluster (glow) -->
    <g filter="url(#glow)">
      <g stroke="#4ef08c" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M560 300 L400 300 L330 420 L400 540 L560 540 L620 420 Z"/>
        <path d="M620 420 L660 300"/>
        <path d="M620 420 L640 640 L500 710 L360 640"/>
      </g>
      <g fill="#4ef08c">
        <circle cx="560" cy="300" r="22"/>
        <circle cx="400" cy="300" r="22"/>
        <circle cx="660" cy="300" r="18"/>
        <circle cx="330" cy="420" r="22"/>
        <circle cx="620" cy="420" r="22"/>
        <circle cx="400" cy="540" r="22"/>
        <circle cx="560" cy="540" r="22"/>
        <circle cx="640" cy="640" r="22"/>
        <circle cx="500" cy="710" r="22"/>
        <circle cx="360" cy="640" r="22"/>
      </g>
    </g>
  </g>
</svg>